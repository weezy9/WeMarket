<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeGames - Launcher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="wrapper">
        
        <aside class="sidebar">
            <div class="p-3">
                <div class="brand-area text-center my-3">
                    <img src="WeGames_Logo.png" alt="WeGames Logo" class="img-fluid logotipo-sidebar">
                </div>
                
                <ul class="nav flex-column gap-1 mt-4">
                    <li class="nav-item">
                        <a href="#" id="btn-loja" class="nav-link active">
                            <i class="bi bi-house-door-fill me-2"></i> Início / Loja
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" id="btn-favoritos" class="nav-link">
                            <i class="bi bi-heart-fill me-2 text-danger"></i> Favoritos
                        </a>
                    </li>
                </ul>

                <hr class="border-secondary opacity-25 my-4">

                <div class="categories-menu px-2">
                    <small class="text-muted text-uppercase fw-bold d-block mb-3 tracking-wider" style="font-size: 0.7rem;">Categorias</small>
                    <a href="#" class="category-item">Ação</a>
                    <a href="#" class="category-item">Aventura</a>
                    <a href="#" class="category-item">RPG</a>
                    <a href="#" class="category-item">FPS</a>
                    <a href="#" class="category-item">Estratégia</a>
                </div>
            </div>

            <div class="user-profile-widget p-3">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-person-circle fs-4 text-info"></i>
                    <div class="text-truncate">
                        <span class="text-white d-block small fw-bold m-0 p-0">PlayerOne</span>
                        <small class="text-success d-flex align-items-center gap-1 text-xs">
                            <span class="online-indicator"></span> Online
                        </small>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            
            <header class="p-4 border-bottom border-dark d-flex align-items-center justify-content-between">
                <div class="search-box w-100">
                    <i class="bi bi-search text-muted search-icon"></i>
                    <input type="text" id="search-input" class="form-control" placeholder="Buscar jogos pelo título...">
                </div>
            </header>

            <div class="p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 id="section-title" class="text-white fw-bold m-0 text-uppercase tracking-wider">
                        <span class="neon-dot"></span> Em Destaque
                    </h5>
                    <span id="game-count" class="badge bg-dark-card text-muted py-2 px-3">0 jogos encontrados</span>
                </div>

                <div id="loading" class="text-center my-5 py-5">
                    <div class="spinner-border text-info" role="status"></div>
                    <p class="text-muted mt-2">Carregando catálogo da API...</p>
                </div>

                <div id="games-grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4">
                    </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
